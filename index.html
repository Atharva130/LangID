<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Language Identifier</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 620px;
        padding: 40px;
    }

    h1 {
        font-size: 30px;
        font-weight: 800;
        background: linear-gradient(90deg, #ff6b6b, #f7971e, #ffe066, #56ab2f, #4ecdc4, #a18cd1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 6px;
    }

    p.subtitle {
        color: #555;
        margin-bottom: 32px;
        font-size: 14px;
    }

    textarea {
        width: 100%;
        height: 140px;
        background: #111;
        border: 1px solid #222;
        border-radius: 14px;
        color: #fff;
        font-size: 16px;
        padding: 16px;
        resize: none;
        outline: none;
        transition: border 0.3s;
    }

    textarea:focus {
        border-color: #f7971e;
        box-shadow: 0 0 0 3px rgba(247,151,30,0.08);
    }

    textarea::placeholder { color: #444; }

    .result-box {
        margin-top: 24px;
        background: #111;
        border-radius: 14px;
        padding: 24px;
        display: none;
        border: 1px solid #1e1e1e;
    }

    .main-result {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }

    .language {
        font-size: 36px;
        font-weight: 800;
        background: linear-gradient(90deg, #ff6b6b, #f7971e, #ffe066);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .language span {
        font-size: 14px;
        color: #666;
        font-weight: 400;
        display: block;
        margin-top: 2px;
        -webkit-text-fill-color: #666;
    }

    .confidence-badge {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border: 1px solid #2a2a4a;
        padding: 10px 18px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 700;
        color: #a18cd1;
    }

    .top3-title {
        font-size: 11px;
        color: #444;
        margin-bottom: 14px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    .bar-row { margin-bottom: 14px; }

    .bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: #888;
        margin-bottom: 6px;
    }

    .bar-track {
        background: #1a1a1a;
        border-radius: 6px;
        height: 7px;
        overflow: hidden;
    }

    /* each bar gets a different holi color */
    .bar-fill-0 {
        height: 100%;
        border-radius: 6px;
        background: linear-gradient(90deg, #ff6b6b, #f7971e);
        transition: width 0.4s ease;
    }

    .bar-fill-1 {
        height: 100%;
        border-radius: 6px;
        background: linear-gradient(90deg, #4ecdc4, #56ab2f);
        transition: width 0.4s ease;
    }

    .bar-fill-2 {
        height: 100%;
        border-radius: 6px;
        background: linear-gradient(90deg, #a18cd1, #fbc2eb);
        transition: width 0.4s ease;
    }

    .typing-indicator {
        font-size: 12px;
        color: #f7971e;
        margin-top: 8px;
        height: 16px;
    }

    .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, #2a2a2a, transparent);
        margin: 20px 0;
    }
</style>
</head>
<body>
<div class="container">
    <h1>🌍 Language Identifier</h1>
    <p class="subtitle">Type in any language — identified in real time</p>

    <textarea id="inputText" placeholder="Start typing..."></textarea>
    <div class="typing-indicator" id="typingIndicator"></div>

    <div class="result-box" id="resultBox">
        <div class="main-result">
            <div class="language" id="mainLang">
                --
                <span id="mainLangFull"></span>
            </div>
            <div class="confidence-badge" id="mainConf">--%</div>
        </div>

        <div class="top3-title">Top Predictions</div>
        <div id="top3Bars"></div>
    </div>
</div>

<script>
    // full language names for display
    const langNames = {
        ar:'Arabic', bg:'Bulgarian', de:'German', el:'Greek',
        en:'English', es:'Spanish', fr:'French', hi:'Hindi',
        it:'Italian', ja:'Japanese', nl:'Dutch', pl:'Polish',
        pt:'Portuguese', ru:'Russian', sw:'Swahili', th:'Thai',
        tr:'Turkish', ur:'Urdu', vi:'Vietnamese', zh:'Chinese'
    };

    const textarea  = document.getElementById('inputText');
    const resultBox = document.getElementById('resultBox');
    const mainLang  = document.getElementById('mainLang');
    const mainLangFull = document.getElementById('mainLangFull');
    const mainConf  = document.getElementById('mainConf');
    const top3Bars  = document.getElementById('top3Bars');
    const typingIndicator = document.getElementById('typingIndicator');

    let debounceTimer;

    textarea.addEventListener('input', () => {
        const text = textarea.value.trim();

        if (!text) {
            resultBox.style.display = 'none';
            typingIndicator.textContent = '';
            return;
        }

        // debounce — wait 300ms after user stops typing before calling API
        // prevents hammering the API on every keystroke
        typingIndicator.textContent = 'Detecting...';
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => predict(text), 300);
    });

    async function predict(text) {
        try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });

            const data = await response.json();

            if (data.error) {
                typingIndicator.textContent = '';
                return;
            }

            // update main result
            const code = data.language;
            mainLang.childNodes[0].textContent = code.toUpperCase();
            mainLangFull.textContent = langNames[code] || code;
            mainConf.textContent = data.confidence.toFixed(1) + '%';

            // update top 3 bars
            top3Bars.innerHTML = '';
            data.top3.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'bar-row';
                div.innerHTML = `
                    <div class="bar-label">
                        <span>${langNames[item.language] || item.language}</span>
                        <span>${item.confidence.toFixed(1)}%</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill-${index}" style="width: ${item.confidence}%"></div>
                    </div>
                `;
                top3Bars.appendChild(div);
            });

            resultBox.style.display = 'block';
            typingIndicator.textContent = '';

        } catch (err) {
            typingIndicator.textContent = 'API not reachable';
        }
    }
</script>
</body>
</html>
